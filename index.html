<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caeden Pong: Hammer Time Fire</title>
    <style>
        body {
            background-color: #0f0f0f; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }
        #ui-top { display: flex; width: 800px; justify-content: space-between; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; }
        canvas { background-color: black; display: block; }
        
        #power-box { width: 800px; height: 20px; background: #222; border: 2px solid #444; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0, #f0f); transition: width 0.3s; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .menu-card { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 2px solid #4a90e2; text-align: center; }
        h1 { font-size: 4rem; color: #4a90e2; text-transform: uppercase; text-shadow: 4px 4px 0px #111, 8px 8px 0px #333; margin: 0 0 20px 0; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 200px; }
        button { padding: 12px 30px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit; }
        
        #footer { display: flex; width: 800px; gap: 20px; margin-top: 15px; }
        .leaderboard { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; height: 120px; overflow-y: auto; font-family: sans-serif; }
        .controls-hint { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; font-family: sans-serif; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="YOUR_SONG_LINK_HERE.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-top">
        <div id="p1-label">Blue: 0</div>
        <div style="display: flex; gap: 15px;">
            <span>10 POINTS TO WIN</span>
        </div>
        <div id="p2-label">Red: 0</div>
    </div>

    <div id="game-container">
        <div id="start-screen">
            <div class="menu-card">
                <h1 id="menu-title">CAEDEN PONG</h1>
                <div id="inputs">
                    <input type="text" id="p1-input" placeholder="Player 1 Name">
                    <input type="text" id="p2-input" placeholder="Player 2 Name">
                    <br><button onclick="initGame()">START MATCH</button>
                </div>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
    </div>

    <div id="power-box"><div id="power-fill"></div></div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const music = document.getElementById("bgMusic");
        
        let gameActive = false, paused = false, countdownActive = false;
        let score1 = 0, score2 = 0, hits = 0, shakeTime = 0, countdown = 0;
        let p1Name = "Blue", p2Name = "Red";

        let p1 = { x: 20, y: 250, lastY: 250, dy: 0, h: 100 };
        let p2 = { x: 765, y: 250, lastY: 250, dy: 0, h: 100 };
        let ball = { x: 400, y: 300, r: 8, dx: 5, dy: 5, color: "white", isPower: false };
        
        let trail = []; // Array to store ball trail
        let particles = [], notifications = [];
        const keys = {};

        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && gameActive) {
                paused = !paused;
                paused ? music.pause() : music.play();
            }
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        function initGame() {
            score1 = 0; score2 = 0; hits = 0; ball.isPower = false; trail = [];
            p1Name = document.getElementById("p1-input").value || "Blue";
            p2Name = document.getElementById("p2-input").value || "Red";
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("inputs").style.display = "block";
            document.getElementById("menu-title").textContent = "CAEDEN PONG";
            music.volume = 0.3; music.play();
            countdown = 3; countdownActive = true;
            let timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) { clearInterval(timer); countdownActive = false; gameActive = true; }
            }, 1000);
        }

        function resetBall(scoredX) {
            for(let i=0; i<20; i++) particles.push({x: scoredX, y: ball.y, dx: (Math.random()-0.5)*15, dy: (Math.random()-0.5)*15, life: 30, color: ball.color});
            hits = 0; ball.isPower = false; trail = [];
            document.getElementById("power-fill").style.width = "0%";
            ball.x = 400; ball.y = 300; ball.dx = (Math.random() > 0.5 ? 5 : -5); ball.dy = (Math.random()-0.5)*8;
            ball.color = "white"; shakeTime = 15;
            document.getElementById("p1-label").textContent = `${p1Name}: ${score1}`;
            document.getElementById("p2-label").textContent = `${p2Name}: ${score2}`;
            if (score1 >= 10 || score2 >= 10) {
                gameActive = false;
                document.getElementById("start-screen").style.display = "flex";
                document.getElementById("menu-title").textContent = (score1 >= 10 ? p1Name : p2Name) + " WINS!";
                document.getElementById("inputs").style.display = "none";
            }
        }

        function move() {
            if (!gameActive || paused) return;
            if (keys['w'] && p1.y > 0) p1.y -= 10;
            if (keys['s'] && p1.y < 600 - p1.h) p1.y += 10;
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= 10;
            if (keys['ArrowDown'] && p2.y < 600 - p2.h) p2.y += 10;

            // Update trail
            trail.push({x: ball.x, y: ball.y});
            if (trail.length > 10) trail.shift();

            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.y < 0 || ball.y > 600) ball.dy *= -1;

            if (ball.x < p1.x + 15 && ball.y > p1.y && ball.y < p1.y + p1.h) {
                ball.dx = Math.abs(ball.dx); ball.x = p1.x + 16; handleHit();
            }
            if (ball.x > p2.x - 5 && ball.y > p2.y && ball.y < p2.y + p2.h) {
                ball.dx = -Math.abs(ball.dx); ball.x = p2.x - 6; handleHit();
            }

            function handleHit() {
                hits++;
                if (hits >= 10) {
                    ball.dx *= 2; ball.isPower = true; hits = 0;
                    notifications.push({text: "FIRE BALL!", x: ball.x, y: ball.y, life: 60, opacity: 1});
                } else {
                    ball.isPower = false;
                }
                document.getElementById("power-fill").style.width = (hits * 10) + "%";
                ball.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }

            if (ball.x < 0) { score2++; resetBall(0); }
            if (ball.x > 800) { score1++; resetBall(800); }

            particles.forEach((p, i) => { p.x += p.dx; p.y += p.dy; p.life--; if(p.life <= 0) particles.splice(i, 1); });
        }

        function draw() {
            ctx.save();
            if (shakeTime > 0) { ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10); shakeTime--; }
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 800, 600);
            
            // Draw Trail
            trail.forEach((t, i) => {
                ctx.globalAlpha = i / 10;
                ctx.fillStyle = ball.isPower ? `rgb(255, ${i*25}, 0)` : ball.color;
                ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * (i/10), 0, Math.PI*2); ctx.fill();
            });

            ctx.globalAlpha = 1;
            ctx.fillStyle = "#4a90e2"; ctx.fillRect(p1.x, p1.y, 15, p1.h);
            ctx.fillStyle = "#ff3e3e"; ctx.fillRect(p2.x, p2.y, 15, p2.h);
            
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/30; ctx.fillRect(p.x, p.y, 5, 5); });
            notifications.forEach((n, i) => {
                ctx.globalAlpha = n.opacity; ctx.fillStyle = "orange"; ctx.font = "bold 20px Arial";
                ctx.fillText(n.text, n.x, n.y); n.y--; n.opacity -= 0.02; if(n.opacity <= 0) notifications.splice(i, 1);
            });
            
            ctx.globalAlpha = 1; ctx.fillStyle = ball.color;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            
            if (paused) { ctx.fillStyle = "yellow"; ctx.font = "bold 60px Arial"; ctx.textAlign="center"; ctx.fillText("STOP! HAMMER TIME!", 400, 300); }
            if (countdownActive) { ctx.fillStyle = "white"; ctx.font = "bold 120px Arial"; ctx.textAlign="center"; ctx.fillText(countdown, 400, 320); }
            ctx.restore();
        }

        function loop() { move(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
