<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caeden Pong: Hammer Time</title>
    <style>
        body {
            background-color: #0f0f0f; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }
        #ui-top { display: flex; width: 800px; justify-content: space-between; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; }
        canvas { background-color: black; display: block; }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .menu-card { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 2px solid #4a90e2; text-align: center; }
        h1 { font-size: 4rem; color: #4a90e2; text-transform: uppercase; text-shadow: 4px 4px 0px #111, 8px 8px 0px #333; margin: 0 0 20px 0; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 200px; }
        button { padding: 12px 30px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit; }
        #footer { display: flex; width: 800px; gap: 20px; margin-top: 15px; }
        .leaderboard { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; height: 120px; overflow-y: auto; font-family: sans-serif; }
        .controls-hint { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; font-family: sans-serif; }
        .toggle-box { display: flex; align-items: center; gap: 10px; background: #222; padding: 5px 15px; border-radius: 20px; border: 1px solid #444; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #ff3e3e; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
        .caeden-icon { width: 30px; height: 30px; border-radius: 50%; border: 2px solid gold; object-fit: cover; filter: grayscale(100%); transition: 0.3s; }
        #caeden-toggle:checked + .caeden-icon { filter: grayscale(0%) drop-shadow(0 0 5px gold); transform: scale(1.2); }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="YOUR_SONG_LINK_HERE.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-top">
        <div id="p1-label">Blue: 0</div>
        <div style="display: flex; gap: 15px;">
            <div class="toggle-box">
                <span style="font-size: 0.7rem;">CHAOS</span>
                <label class="switch"><input type="checkbox" id="chaos-toggle"><span class="slider"></span></label>
            </div>
            <div class="toggle-box">
                <span style="font-size: 0.7rem;">CAEDEN MODE</span>
                <label>
                    <input type="checkbox" id="caeden-toggle" style="display:none">
                    <img src="YOUR_IMAGE_HERE.jpg" class="caeden-icon" alt="Caeden Mode">
                </label>
            </div>
        </div>
        <div id="p2-label">Red: 0</div>
    </div>

    <div id="game-container">
        <div id="start-screen">
            <div class="menu-card">
                <h1>CAEDEN PONG</h1>
                <input type="text" id="p1-input" placeholder="Player 1 Name">
                <input type="text" id="p2-input" placeholder="Player 2 Name">
                <br><button onclick="initGame()">START MATCH</button>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
    </div>

    <div id="footer">
        <div class="leaderboard">
            <strong style="color: gold;">🏆 TOP SCORES</strong>
            <div id="score-list" style="font-size: 0.9rem; margin-top: 5px;"></div>
        </div>
        <div class="controls-hint">
            <div style="font-size: 0.8rem; color: #888;">BLUE: W / S Keys | RED: Up / Down Arrows</div>
            <div style="font-size: 0.8rem; color: #aaa; margin-top:5px;">SPACEBAR: STOP! HAMMER TIME!</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const music = document.getElementById("bgMusic");
        
        let gameActive = false;
        let paused = false;
        let countdown = 0;
        let countdownActive = false;
        let shakeTime = 0;

        let p1Name = "Blue", p2Name = "Red";
        let score1 = 0, score2 = 0;
        let p1H = 100, p2H = 100;
        
        let p1 = { x: 20, y: 250, lastY: 250, dy: 0 };
        let p2 = { x: 765, y: 250, lastY: 250, dy: 0 };
        let ball = { x: 400, y: 300, r: 8, dx: 5, dy: 5, alpha: 1, color: "white" };
        
        let powerups = [];
        let notifications = [];
        let particles = [];
        const keys = {};
        const emojiMap = { 'speed': '⚡', 'size': '📏', 'ghost': '👻', 'gravity': '🌪️', 'caeden': '👑' };
        let spawnRate = 5000;

        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && gameActive) {
                paused = !paused;
                if (paused) music.pause();
                else music.play();
            }
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    dx: (Math.random() - 0.5) * 15,
                    dy: (Math.random() - 0.5) * 15,
                    life: 30,
                    color: color
                });
            }
        }

        function initGame() {
            p1Name = document.getElementById("p1-input").value || "Blue";
            p2Name = document.getElementById("p2-input").value || "Red";
            document.getElementById("start-screen").style.display = "none";
            updateLabels();
            music.volume = 0.3;
            music.play();
            countdown = 3;
            countdownActive = true;
            let timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    countdownActive = false;
                    gameActive = true;
                    chaosSpawner();
                }
            }, 1000);
        }

        function chaosSpawner() {
            if (!gameActive) return;
            if (!paused) {
                const isChaos = document.getElementById("chaos-toggle").checked;
                const isCaeden = document.getElementById("caeden-toggle").checked;
                if (isChaos || isCaeden) spawnPowerup();
                if (isCaeden) spawnRate = Math.max(400, spawnRate - 150);
            }
            setTimeout(chaosSpawner, spawnRate);
        }

        function spawnPowerup() {
            const types = Object.keys(emojiMap);
            powerups.push({ x: 150 + Math.random() * 500, y: 100 + Math.random() * 400, type: types[Math.floor(Math.random() * types.length)], life: 400 });
        }

        function triggerNotification(text, x, y) {
            notifications.push({ text, x, y, life: 60, opacity: 1 });
        }

        function applyEffect(type, x, y) {
            triggerNotification(type.toUpperCase() + "!", x, y);
            if (type === 'speed') { ball.dx *= 1.4; ball.dy *= 1.4; }
            if (type === 'size') { p1H += 40; p2H += 40; setTimeout(() => { p1H = 100; p2H = 100; }, 7000); }
            if (type === 'ghost') { ball.alpha = 0.15; setTimeout(() => ball.alpha = 1, 4000); }
            if (type === 'gravity' || type === 'caeden') { ball.dy += (Math.random() - 0.5) * 20; }
        }

        function saveToLeaderboard(name, score) {
            let history = JSON.parse(localStorage.getItem("caedenScores") || "[]");
            history.push({ name, score, date: new Date().toLocaleDateString() });
            history.sort((a,b) => b.score - a.score);
            localStorage.setItem("caedenScores", JSON.stringify(history.slice(0, 5)));
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const history = JSON.parse(localStorage.getItem("caedenScores") || "[]");
            document.getElementById("score-list").innerHTML = history.length ? history.map(s => `<div>${s.name}: ${s.score} <small>(${s.date})</small></div>`).join("") : "No pro games yet!";
        }

        function updateLabels() {
            document.getElementById("p1-label").textContent = `${p1Name}: ${score1}`;
            document.getElementById("p2-label").textContent = `${p2Name}: ${score2}`;
        }

        function resetBall(scoredX) {
            createExplosion(scoredX, ball.y, ball.color);
            ball.x = 400; ball.y = 300;
            ball.dx = (Math.random() > 0.5 ? 5 : -5);
            ball.dy = (Math.random() - 0.5) * 8;
            ball.alpha = 1;
            ball.color = "white";
            shakeTime = 15;
            updateLabels();
        }

        function move() {
            if (!gameActive || paused) return;
            p1.dy = p1.y - p1.lastY; p1.lastY = p1.y;
            p2.dy = p2.y - p2.lastY; p2.lastY = p2.y;

            if (keys['w'] && p1.y > 0) p1.y -= 10;
            if (keys['s'] && p1.y < 600 - p1H) p1.y += 10;
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= 10;
            if (keys['ArrowDown'] && p2.y < 600 - p2H) p2.y += 10;

            if (document.getElementById("caeden-toggle").checked) ball.dy += Math.sin(ball.x * 0.01) * 0.9;

            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.y < 0 || ball.y > 600) ball.dy *= -1;

            if (ball.x < p1.x + 15 && ball.y > p1.y && ball.y < p1.y + p1H) {
                ball.dx = Math.abs(ball.dx); ball.dy += p1.dy * 0.5; ball.x = p1.x + 16; 
                ball.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            if (ball.x > p2.x - 5 && ball.y > p2.y && ball.y < p2.y + p2H) {
                ball.dx = -Math.abs(ball.dx); ball.dy += p2.dy * 0.5; ball.x = p2.x - 6;
                ball.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }

            if (ball.x < 0) { score2++; saveToLeaderboard(p2Name, score2); resetBall(0); }
            if (ball.x > 800) { score1++; saveToLeaderboard(p1Name, score1); resetBall(800); }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.dx; p.y += p.dy; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                if (Math.hypot(ball.x - p.x, ball.y - p.y) < 25) {
                    applyEffect(p.type, p.x, p.y);
                    powerups.splice(i, 1);
                    continue;
                }
                p.life--;
                if(p.life <= 0) powerups.splice(i, 1);
            }
        }

        function draw() {
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
                shakeTime--;
            }

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 800, 600);
            ctx.strokeStyle = "#1a1a1a";
            ctx.setLineDash([10, 15]);
            ctx.beginPath(); ctx.moveTo(400,0); ctx.lineTo(400,600); ctx.stroke();
            ctx.fillStyle = "#4a90e2"; ctx.fillRect(p1.x, p1.y, 15, p1H);
            ctx.fillStyle = "#ff3e3e"; ctx.fillRect(p2.x, p2.y, 15, p2H);
            
            powerups.forEach(p => { ctx.font = "30px Arial"; ctx.textAlign = "center"; ctx.fillText(emojiMap[p.type], p.x, p.y + 10); });
            
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 5, 5);
            });

            notifications.forEach((n, i) => {
                ctx.globalAlpha = n.opacity; ctx.fillStyle = "yellow"; ctx.font = "bold 20px Arial";
                ctx.fillText(n.text, n.x, n.y); n.y -= 1; n.opacity -= 0.02; n.life--;
                if(n.life <= 0) notifications.splice(i, 1);
            });
            
            ctx.globalAlpha = ball.alpha; ctx.fillStyle = ball.color; 
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            
            if (paused) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0,0,800,600);
                ctx.fillStyle = "yellow";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("STOP! HAMMER TIME!", 400, 300);
            }

            ctx.globalAlpha = 1;
            if (countdownActive) { ctx.fillStyle = "white"; ctx.font = "bold 120px 'Courier New'"; ctx.textAlign = "center"; ctx.fillText(countdown, 400, 320); }
            ctx.restore();
        }

        function loop() { move(); draw(); requestAnimationFrame(loop); }
        displayLeaderboard();
        loop();
    </script>
</body>
</html>
