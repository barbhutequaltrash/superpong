<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caeden Pong: Master Edition</title>
    <style>
        body {
            background-color: #050505; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }
        #ui-top { display: flex; width: 850px; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; }
        canvas { display: block; background: black; }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .menu-card { background: #111; padding: 20px; border-radius: 15px; border: 2px solid #4a90e2; text-align: center; width: 550px; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; background: #1a1a1a; padding: 15px; border-radius: 10px; }
        .setup-item { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; font-size: 0.7rem; }
        
        #leaderboard-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 20px; border: 2px solid #ffca28; border-radius: 10px;
            z-index: 30; width: 300px; text-align: center; box-shadow: 0 0 50px black;
        }

        button { padding: 10px 15px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        .lead-btn { background: #ffca28; color: black; }
        select { padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; width: 100%; font-family: inherit; }
        .lead-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div id="p1-ui">P1: 0</div>
        <div id="event-msg" style="color:#00ffff; font-size:0.8rem;">MASTER EDITION</div>
        <div id="p2-ui">P2: 0</div>
    </div>

    <div id="game-container">
        <div id="leaderboard-modal">
            <h2 style="color:#ffca28">HALL OF FAME</h2>
            <div id="leaderboard-content"></div>
            <button onclick="toggleModal('leaderboard-modal', false)">CLOSE</button>
        </div>

        <div id="start-screen">
            <div class="menu-card">
                <h1 style="color:#4a90e2; margin:0;">CAEDEN PONG</h1>
                <div class="setup-grid">
                    <div class="setup-item">
                        <label>PLAYER 1 (SHIFT)</label>
                        <select id="p1-select"><option>DAD</option><option>RORY</option><option>CAEDEN</option><option>QUINN</option><option>MOM</option></select>
                    </div>
                    <div class="setup-item">
                        <label>PLAYER 2 (ENTER)</label>
                        <select id="p2-select"><option>RORY</option><option>DAD</option><option>CAEDEN</option><option>QUINN</option><option>MOM</option></select>
                    </div>
                    <div class="setup-item" style="grid-column: span 2;">
                        <label>ANIMATED ARENA</label>
                        <select id="arena-select">
                            <option value="none">CLASSIC</option>
                            <option value="starfield">STARFIELD</option>
                            <option value="lava">LAVA LEAK</option>
                            <option value="disco">DISCO FLOOR</option>
                            <option value="matrix">MATRIX VOID</option>
                            <option value="fire">FIRE DIMENSION</option>
                        </select>
                    </div>
                </div>
                <button class="lead-btn" onclick="showLeaderboard()">LEADERBOARD</button>
                <button style="width: 90%; font-size: 1.1rem;" onclick="initGame()">START MATCH</button>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        let gameActive = false, score1 = 0, score2 = 0, arenaType = "";
        let p1Name = "", p2Name = "";
        // Added 'hits' to player objects
        let p1 = { y: 250, h: 100, dy: 0, powerReady: true, hits: 0 };
        let p2 = { y: 250, h: 100, dy: 0, powerReady: true, hits: 0 };
        let balls = [], keys = {}, particles = [], stars = [], bubbles = [], matrixChars = [];

        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === "Shift" && p1.powerReady && gameActive) usePower(p1Name, p1, balls[0]);
            if (e.key === "Enter" && p2.powerReady && gameActive) usePower(p2Name, p2, balls[0]);
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'block' : 'none'; }

        function showLeaderboard() {
            const wins = JSON.parse(localStorage.getItem('pongWins')) || {};
            const content = document.getElementById('leaderboard-content');
            content.innerHTML = "";
            Object.entries(wins).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
                content.innerHTML += `<div class="lead-row"><span>${name}</span><span>${count} Wins</span></div>`;
            });
            toggleModal('leaderboard-modal', true);
        }

        function usePower(name, user, ball) {
            user.powerReady = false;
            if (name === "DAD") { user.h = 200; setTimeout(() => user.h = 100, 3000); }
            if (name === "CAEDEN") { ball.dx *= 2.2; }
            if (name === "MOM") { ball.dx *= 0.4; setTimeout(() => ball.dx *= 2.5, 2000); }
            if (name === "RORY") { ball.ghost = true; setTimeout(() => ball.ghost = false, 1500); }
            if (name === "QUINN") { ball.y = user.y + user.h/2; }
        }

        function initGame() {
            p1Name = document.getElementById("p1-select").value;
            p2Name = document.getElementById("p2-select").value;
            arenaType = document.getElementById("arena-select").value;
            score1 = 0; score2 = 0; p1.hits = 0; p2.hits = 0;
            stars = []; bubbles = []; matrixChars = [];
            if(arenaType === "starfield") for(let i=0; i<50; i++) stars.push({x: Math.random()*800, y: Math.random()*600, s: 1+Math.random()*3});
            if(arenaType === "lava") for(let i=0; i<15; i++) bubbles.push({x: Math.random()*800, y: 620, r: 5+Math.random()*10, s: 0.5+Math.random()});
            if(arenaType === "matrix") for(let i=0; i<40; i++) matrixChars.push({x: i*20, y: Math.random()*600, s: 2+Math.random()*5});
            resetBall();
            document.getElementById("start-screen").style.display = "none";
            gameActive = true;
        }

        function resetBall() {
            // Added 'w' (width) and 'super' state to the ball
            balls = [{ x: 400, y: 300, dx: 5, dy: 3, r: 8, w: 8, ghost: false, super: false }];
            p1.powerReady = true; p2.powerReady = true;
            if (score1 >= 10 || score2 >= 10) endGame();
        }

        function endGame() {
            gameActive = false;
            const winner = score1 >= 10 ? p1Name : p2Name;
            let wins = JSON.parse(localStorage.getItem('pongWins')) || {};
            wins[winner] = (wins[winner] || 0) + 1;
            localStorage.setItem('pongWins', JSON.stringify(wins));
            document.getElementById("start-screen").style.display = "flex";
        }

        function loop() {
            if (gameActive) {
                if (keys['w'] && p1.y > 0) p1.y -= 7; if (keys['s'] && p1.y < 600-p1.h) p1.y += 7;
                if (keys['ArrowUp'] && p2.y > 0) p2.y -= 7; if (keys['ArrowDown'] && p2.y < 600-p2.h) p2.y += 7;

                balls.forEach(ball => {
                    ball.x += ball.dx; ball.y += ball.dy;
                    if (ball.y < 0 || ball.y > 600) ball.dy *= -1;

                    // P1 Collision + Pinch Logic
                    if (ball.x < 35 && ball.y > p1.y && ball.y < p1.y + p1.h) {
                        ball.dx = Math.abs(ball.dx) + 0.2;
                        p1.hits++; 
                        ball.w = 3; setTimeout(() => ball.w = 8, 100); // Pinch effect
                        if(p1.hits >= 10) { 
                            ball.dx *= 2; ball.super = true; p1.hits = 0;
                            setTimeout(() => ball.super = false, 2000);
                        }
                    }
                    // P2 Collision + Pinch Logic
                    if (ball.x > 765 && ball.y > p2.y && ball.y < p2.y + p2.h) {
                        ball.dx = -Math.abs(ball.dx) - 0.2;
                        p2.hits++;
                        ball.w = 3; setTimeout(() => ball.w = 8, 100); // Pinch effect
                        if(p2.hits >= 10) { 
                            ball.dx *= 2; ball.super = true; p2.hits = 0;
                            setTimeout(() => ball.super = false, 2000);
                        }
                    }
                    
                    let pColor = ball.super ? "#ff00ff" : (ball.ghost ? "rgba(255,255,255,0.2)" : "white");
                    if(arenaType === "starfield") pColor = ball.super ? "#ff00ff" : "#aaaaff";
                    particles.push({x: ball.x, y: ball.y, life: 12, color: pColor});

                    if (ball.x < 0) { score2++; p1.hits = 0; p2.hits = 0; resetBall(); }
                    if (ball.x > 800) { score1++; p1.hits = 0; p2.hits = 0; resetBall(); }
                });
            }
            draw();
            requestAnimationFrame(loop);
        }

        function draw() {
            let bg = "black";
            if(arenaType === "disco") bg = `hsl(${Math.sin(Date.now()/1000)*360}, 20%, 10%)`;
            ctx.fillStyle = bg; ctx.fillRect(0, 0, 800, 600);
            
            // Arenas logic...
            if(arenaType === "starfield") {
                ctx.fillStyle = "white";
                stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.x -= s.s; if(s.x < 0) s.x = 800; });
            }
            if(arenaType === "lava") {
                bubbles.forEach(b => {
                    ctx.fillStyle = "rgba(255, 68, 0, 0.3)"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                    b.y -= b.s; if(b.y < -20) { b.y = 620; b.x = Math.random()*800; }
                });
            }
            if(arenaType === "matrix") {
                ctx.fillStyle = "#00ff00"; ctx.font = "15px monospace";
                matrixChars.forEach(m => {
                    ctx.fillText(Math.floor(Math.random()*9), m.x, m.y);
                    m.y += m.s; if(m.y > 600) m.y = -20;
                });
            }

            // Power Bars
            ctx.fillStyle = "#4a90e2"; ctx.fillRect(20, 45, p1.hits * 8, 4);
            ctx.fillStyle = "#ff3e3e"; ctx.fillRect(780 - (p2.hits * 8), 45, p2.hits * 8, 4);

            particles.forEach((p, i) => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 12;
                ctx.fillRect(p.x-2, p.y-2, 4, 4);
                p.life--; if (p.life <= 0) particles.splice(i, 1);
            });

            ctx.globalAlpha = 1;
            balls.forEach(b => { 
                ctx.globalAlpha = b.ghost ? 0.3 : 1;
                ctx.fillStyle = b.super ? "#ff00ff" : "white"; 
                ctx.beginPath();
                // Ellipse allows the 'w' and 'r' to create the pinch look
                ctx.ellipse(b.x, b.y, b.w, b.r, 0, 0, Math.PI*2);
                ctx.fill(); 
            });
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#4a90e2"; ctx.fillRect(20, p1.y, 15, p1.h);
            ctx.fillStyle = "#ff3e3e"; ctx.fillRect(765, p2.y, 15, p2.h);
            
            document.getElementById("p1-ui").innerHTML = `${p1Name}: ${score1}`;
            document.getElementById("p2-ui").innerHTML = `${p2Name}: ${score2}`;
        }
        loop();
    </script>
</body>
</html>
