<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caeden Pong: The Master Edition</title>
    <style>
        body {
            background-color: #0f0f0f; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        #ui-top { display: flex; width: 800px; justify-content: space-between; margin-bottom: 10px; font-size: 1.1rem; font-weight: bold; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; }
        canvas { display: block; background-color: black; }
        
        /* Menus */
        #start-screen, #win-screen {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .menu-card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #4a90e2; text-align: center; width: 450px; }
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 80%; }
        button { padding: 12px 30px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Stats & Meters */
        .meter-container { width: 120px; height: 8px; background: #333; border-radius: 4px; margin-top: 4px; overflow: hidden; }
        .meter-fill { height: 100%; width: 0%; transition: width 0.2s; }
        #footer { display: flex; width: 800px; gap: 15px; margin-top: 10px; }
        .box { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 0.8rem; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div>
            <div id="p1-label">Player 1: 0</div>
            <div class="meter-container"><div id="p1-meter" class="meter-fill" style="background: #0ff;"></div></div>
        </div>
        <div style="text-align: center; font-size: 0.8rem; color: #888;">SPACE = SUPER SHOT</div>
        <div style="text-align: right;">
            <div id="p2-label">CPU: 0</div>
            <div class="meter-container"><div id="p2-meter" class="meter-fill" style="background: #f0f;"></div></div>
        </div>
    </div>

    <div id="game-container">
        <div id="start-screen">
            <div class="menu-card">
                <h1 style="color: #4a90e2; margin-top:0;">CAEDEN PONG</h1>
                <input type="text" id="p1-name" placeholder="Enter Name">
                <select id="mode-select"><option value="pvc">vs Smart AI</option><option value="pvp">vs Local Friend</option></select>
                <select id="theme-select">
                    <option value="neon">Neon Nights</option><option value="matrix">Digital Matrix</option>
                    <option value="lava">Lava Pit</option><option value="space">Deep Space</option>
                    <option value="ice">Frozen Tundra</option><option value="candy">Candy Kingdom</option>
                </select>
                <button onclick="initGame()">START MATCH</button>
            </div>
        </div>
        <div id="win-screen" style="display:none;">
            <div class="menu-card"><h1 id="winner-text" style="color: gold;">WINNER!</h1><button onclick="location.reload()">PLAY AGAIN</button></div>
        </div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
    </div>

    <div id="footer">
        <div class="box"><strong>🏆 LEADERBOARD</strong><div id="score-list"></div></div>
        <div class="box"><strong>🎮 CONTROLS</strong><br>P1: W/S (Space for Super)<br>P2: Arrows (Enter for Super)</div>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameActive = false, isPvP = false, shake = 0;
        let score1 = 0, score2 = 0, p1Name = "P1";
        let p1 = { y: 250, vy: 0, h: 100, meter: 0 }, p2 = { y: 250, vy: 0, h: 100, meter: 0 };
        let ball = { x: 400, y: 300, r: 8, dx: 5, dy: 5, history: [], color: "white" };
        let particles = [], powerups = [], bgElements = [], keys = {};

        const themes = {
            neon: { bg: "#0a0a0a", p1: "#0ff", p2: "#f0f", ball: "#fff" },
            matrix: { bg: "#000", p1: "#0f0", p2: "#080", ball: "#0f0" },
            lava: { bg: "#1a0000", p1: "#f40", p2: "#800", ball: "#ff0" },
            space: { bg: "#00001a", p1: "#fff", p2: "#888", ball: "#fff" },
            ice: { bg: "#f0f8ff", p1: "#00bfff", p2: "#add8e6", ball: "#1e90ff" },
            candy: { bg: "#603060", p1: "#ff69b4", p2: "#da70d6", ball: "#fff" }
        };
        let theme = themes.neon;

        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        function playSound(f, t, d) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<12; i++) particles.push({ x, y, dx: (Math.random()-0.5)*12, dy: (Math.random()-0.5)*12, life: 30, color });
        }

        function initGame() {
            p1Name = document.getElementById("p1-name").value || "Player 1";
            isPvP = document.getElementById("mode-select").value === "pvp";
            theme = themes[document.getElementById("theme-select").value];
            document.getElementById("start-screen").style.display = "none";
            for(let i=0; i<25; i++) bgElements.push({x: Math.random()*800, y: Math.random()*600, s: Math.random()*2});
            gameActive = true;
            setInterval(() => { if(gameActive) powerups.push({x: 200+Math.random()*400, y: 100+Math.random()*400, type: '⚡', life: 300})}, 7000);
            loop();
        }

        function move() {
            if (!gameActive) return;
            // P1 Movement & Super
            if (keys['w']) p1.vy -= 1.4; else if (keys['s']) p1.vy += 1.4; else p1.vy *= 0.8;
            p1.y = Math.max(0, Math.min(500, p1.y + p1.vy));
            if (keys[' '] && p1.meter >= 100) { p1.meter = 0; ball.dx *= 2.5; shake = 15; playSound(600, 'square', 0.2); }

            // P2 Movement (AI or PvP)
            if (isPvP) {
                if (keys['ArrowUp']) p2.vy -= 1.4; else if (keys['ArrowDown']) p2.vy += 1.4; else p2.vy *= 0.8;
                if (keys['Enter'] && p2.meter >= 100) { p2.meter = 0; ball.dx *= 2.5; shake = 15; playSound(600, 'square', 0.2); }
            } else { p2.y += (ball.y - (p2.y + 50)) * 0.12; }
            p2.y = Math.max(0, Math.min(500, p2.y + p2.vy));

            // Ball & Trail
            ball.x += ball.dx; ball.y += ball.dy;
            ball.history.push({x: ball.x, y: ball.y}); if(ball.history.length > 6) ball.history.shift();

            // Bounces
            if (ball.y < 0 || ball.y > 600) { ball.dy *= -1; playSound(150, 'sine', 0.1); }
            if (ball.x < 40 && ball.y > p1.y && ball.y < p1.y + p1.h) {
                ball.dx = Math.abs(ball.dx) + 0.3; ball.dy += p1.vy * 0.2;
                p1.meter = Math.min(100, p1.meter + 15); shake = 5; createExplosion(ball.x, ball.y, theme.p1); playSound(300, 'triangle', 0.1);
            }
            if (ball.x > 745 && ball.y > p2.y && ball.y < p2.y + p2.h) {
                ball.dx = -Math.abs(ball.dx) - 0.3; ball.dy += p2.vy * 0.2;
                p2.meter = Math.min(100, p2.meter + 15); shake = 5; createExplosion(ball.x, ball.y, theme.p2); playSound(300, 'triangle', 0.1);
            }

            // Powerups
            powerups.forEach((p, i) => {
                if (Math.hypot(ball.x - p.x, ball.y - p.y) < 30) { ball.dx *= 1.5; powerups.splice(i, 1); playSound(800, 'sine', 0.2); }
                p.life--; if(p.life <= 0) powerups.splice(i,1);
            });

            // Scoring
            if (ball.x < 0 || ball.x > 800) {
                ball.x > 400 ? score1++ : score2++;
                if (score1 >= 10 || score2 >= 10) endGame();
                else resetBall();
            }

            particles.forEach((p, i) => { p.x += p.dx; p.y += p.dy; p.life--; if(p.life <= 0) particles.splice(i,1); });
            updateUI();
        }

        function resetBall() {
            ball.x = 400; ball.y = 300; ball.dx = 5 * (Math.random() > 0.5 ? 1 : -1); ball.dy = (Math.random()-0.5)*8;
            ball.history = []; playSound(100, 'sawtooth', 0.3);
        }

        function updateUI() {
            document.getElementById("p1-label").textContent = p1Name + ": " + score1;
            document.getElementById("p2-label").textContent = (isPvP ? "P2: " : "CPU: ") + score2;
            document.getElementById("p1-meter").style.width = p1.meter + "%";
            document.getElementById("p2-meter").style.width = p2.meter + "%";
        }

        function endGame() {
            gameActive = false; document.getElementById("win-screen").style.display = "flex";
            const winner = score1 >= 10 ? p1Name : "CPU/P2";
            document.getElementById("winner-text").textContent = winner + " WINS!";
            let history = JSON.parse(localStorage.getItem("pongScores") || "[]");
            history.push({ name: winner, score: Math.max(score1, score2), date: new Date().toLocaleDateString() });
            localStorage.setItem("pongScores", JSON.stringify(history.sort((a,b)=>b.score-a.score).slice(0,5)));
            showLeaderboard();
        }

        function showLeaderboard() {
            const history = JSON.parse(localStorage.getItem("pongScores") || "[]");
            document.getElementById("score-list").innerHTML = history.map(s => `<div>${s.name}: ${s.score}</div>`).join("");
        }

        function draw() {
            ctx.save();
            if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake--; }
            ctx.fillStyle = theme.bg; ctx.fillRect(0, 0, 800, 600);
            bgElements.forEach(b => { ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(b.x, b.y, b.s, b.s); b.y = (b.y + 0.5) % 600; });
            ball.history.forEach((p, i) => { ctx.globalAlpha = i / 10; ctx.fillStyle = theme.ball; ctx.beginPath(); ctx.arc(p.x, p.y, ball.r, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1; ctx.fillStyle = theme.p1; ctx.fillRect(20, p1.y, 15, p1.h);
            ctx.fillStyle = theme.p2; ctx.fillRect(765, p2.y, 15, p2.h);
            ctx.fillStyle = theme.ball; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            powerups.forEach(p => { ctx.font = "20px Arial"; ctx.fillText(p.type, p.x, p.y); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/30; ctx.fillRect(p.x, p.y, 3, 3); });
            ctx.restore();
        }

        function loop() { if(gameActive) { move(); draw(); requestAnimationFrame(loop); } }
        showLeaderboard();
    </script>
</body>
</html>
