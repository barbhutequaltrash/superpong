<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caeden Pong: Ultimate Chaos</title>
    <style>
        body {
            background-color: #0f0f0f; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        #ui-top { display: flex; width: 800px; justify-content: space-between; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; }
        #game-container { position: relative; border: 4px solid #333; border-radius: 8px; }
        canvas { background-color: black; display: block; }
        #start-screen, #win-screen {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }
        .menu-card { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 2px solid #4a90e2; text-align: center; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 200px; }
        button { padding: 12px 30px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #footer { display: flex; width: 800px; gap: 20px; margin-top: 15px; }
        .leaderboard { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; height: 120px; overflow-y: auto; }
        .controls-hint { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
        .toggle-box { display: flex; align-items: center; gap: 10px; background: #222; padding: 5px 15px; border-radius: 20px; border: 1px solid #444; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #ff3e3e; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="ui-top">
        <div id="p1-label">Blue: 0</div>
        <div class="toggle-box">
            <span style="font-size: 0.8rem;">CHAOS MODE</span>
            <label class="switch"><input type="checkbox" id="chaos-toggle" checked><span class="slider"></span></label>
        </div>
        <div id="p2-label">Red: 0</div>
    </div>

    <div id="game-container">
        <div id="start-screen">
            <div class="menu-card">
                <h1 style="color: #4a90e2; margin-top:0;">CAEDEN PONG</h1>
                <input type="text" id="p1-input" placeholder="Player 1 Name">
                <input type="text" id="p2-input" placeholder="Player 2 Name">
                <br><button onclick="initGame()">START MATCH</button>
            </div>
        </div>
        <div id="win-screen" style="display:none;">
            <div class="menu-card">
                <h1 id="winner-text" style="color: gold;">WINNER!</h1>
                <button onclick="location.reload()">PLAY AGAIN</button>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="600"></canvas>
    </div>

    <div id="footer">
        <div class="leaderboard">
            <strong style="color: gold;">🏆 TOP SCORES</strong>
            <div id="score-list" style="font-size: 0.9rem; margin-top: 5px;"></div>
        </div>
        <div class="controls-hint">
            <div style="font-size: 0.8rem; color: #888;">BLUE: W / S Keys | RED: Up / Down Arrows</div>
            <div style="font-size: 0.8rem; color: #aaa; margin-top:5px;">New: Particles, Screen Shake, and Smooth Movement!</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        
        let gameActive = false;
        let p1Name = "Blue", p2Name = "Red";
        let score1 = 0, score2 = 0;
        let p1H = 100, p2H = 100;
        let shakeTime = 0;
        
        let p1 = { x: 20, y: 250, vy: 0 };
        let p2 = { x: 765, y: 250, vy: 0 };
        let ball = { x: 400, y: 300, r: 8, dx: 5, dy: 5, alpha: 1, color: "white" };
        
        let powerups = [], notifications = [], particles = [];
        const keys = {};
        const emojiMap = { 'speed': '⚡', 'size': '📏', 'ghost': '👻', 'gravity': '🌪️' };

        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        function initGame() {
            p1Name = document.getElementById("p1-input").value || "Blue";
            p2Name = document.getElementById("p2-input").value || "Red";
            document.getElementById("start-screen").style.display = "none";
            updateLabels();
            gameActive = true;
            setInterval(spawnPowerup, 5000);
        }

        function createParticles(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    dx: (Math.random()-0.5)*10, 
                    dy: (Math.random()-0.5)*10, 
                    life: 30, color
                });
            }
        }

        function spawnPowerup() {
            if(!gameActive || !document.getElementById("chaos-toggle").checked) return;
            powerups.push({
                x: 150 + Math.random() * 500, y: 100 + Math.random() * 400,
                type: Object.keys(emojiMap)[Math.floor(Math.random() * 4)],
                life: 400
            });
        }

        function resetBall() {
            if (score1 >= 10 || score2 >= 10) endGame();
            ball.x = 400; ball.y = 300;
            ball.dx = (Math.random() > 0.5 ? 5 : -5);
            ball.dy = (Math.random() - 0.5) * 8;
            ball.alpha = 1;
            updateLabels();
        }

        function endGame() {
            gameActive = false;
            document.getElementById("win-screen").style.display = "flex";
            document.getElementById("winner-text").textContent = (score1 >= 10 ? p1Name : p2Name) + " WINS!";
            saveToLeaderboard(score1 >= 10 ? p1Name : p2Name, Math.max(score1, score2));
        }

        function move() {
            if (!gameActive) return;

            // Smooth Movement
            if (keys['w']) p1.vy -= 1.5; else if (keys['s']) p1.vy += 1.5; else p1.vy *= 0.8;
            if (keys['ArrowUp']) p2.vy -= 1.5; else if (keys['ArrowDown']) p2.vy += 1.5; else p2.vy *= 0.8;
            
            p1.y += p1.vy; p2.y += p2.vy;
            p1.y = Math.max(0, Math.min(600 - p1H, p1.y));
            p2.y = Math.max(0, Math.min(600 - p2H, p2.y));

            ball.x += ball.dx; ball.y += ball.dy;

            // Wall Bounce
            if (ball.y < 0 || ball.y > 600) { ball.dy *= -1; shakeTime = 5; }

            // Paddle Collision
            if (ball.x < p1.x + 15 && ball.y > p1.y && ball.y < p1.y + p1H) {
                ball.dx = Math.abs(ball.dx) * 1.05; ball.dy += p1.vy * 0.2;
                ball.color = `hsl(${Math.random()*360}, 100%, 50%)`;
                createParticles(ball.x, ball.y, ball.color);
                shakeTime = 10;
            }
            if (ball.x > p2.x - 5 && ball.y > p2.y && ball.y < p2.y + p2H) {
                ball.dx = -Math.abs(ball.dx) * 1.05; ball.dy += p2.vy * 0.2;
                ball.color = `hsl(${Math.random()*360}, 100%, 50%)`;
                createParticles(ball.x, ball.y, ball.color);
                shakeTime = 10;
            }

            // Speed Cap
            if (Math.abs(ball.dx) > 18) ball.dx = ball.dx > 0 ? 18 : -18;

            if (ball.x < 0) { score2++; resetBall(); }
            if (ball.x > 800) { score1++; resetBall(); }

            particles.forEach((p, i) => { 
                p.x += p.dx; p.y += p.dy; p.life--; 
                if(p.life <= 0) particles.splice(i, 1); 
            });
        }

        function draw() {
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random()-0.5)*7, (Math.random()-0.5)*7);
                shakeTime--;
            }

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 800, 600);
            
            // UI & Objects
            ctx.fillStyle = "#4a90e2"; ctx.fillRect(p1.x, p1.y, 15, p1H);
            ctx.fillStyle = "#ff3e3e"; ctx.fillRect(p2.x, p2.y, 15, p2H);
            
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });

            ctx.globalAlpha = ball.alpha;
            ctx.fillStyle = ball.color;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            
            ctx.font = "30px Arial";
            powerups.forEach(p => ctx.fillText(emojiMap[p.type], p.x, p.y + 10));

            ctx.restore();
        }

        function saveToLeaderboard(name, score) {
            let history = JSON.parse(localStorage.getItem("caedenScores") || "[]");
            history.push({ name, score, date: new Date().toLocaleDateString() });
            history.sort((a,b) => b.score - a.score);
            localStorage.setItem("caedenScores", JSON.stringify(history.slice(0, 5)));
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const history = JSON.parse(localStorage.getItem("caedenScores") || "[]");
            document.getElementById("score-list").innerHTML = history.map(s => `<div>${s.name}: ${s.score}</div>`).join("");
        }

        function updateLabels() {
            document.getElementById("p1-label").textContent = `${p1Name}: ${score1}`;
            document.getElementById("p2-label").textContent = `${p2Name}: ${score2}`;
        }

        function loop() { move(); draw(); requestAnimationFrame(loop); }
        displayLeaderboard();
        loop();
    </script>
</body>
</html>
